<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI NLP Translator</title>
</head>
<body>

    <h2>AI NLP Translator</h2>

    <textarea id="inputText" placeholder="Enter text here..." rows="4" cols="40"></textarea>
    <br><br>

    <select id="lang">
        <option value="kn">Kannada</option>
        <option value="hi">Hindi</option>
        <option value="ta">Tamil</option>
    </select>

    <br><br>

    <button onclick="translateText()">Translate</button>

    <h3>Output:</h3>
    <div id="output"></div>

    <script src="app.js"></script>

</body>
</html>
