<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI NLP Translator</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .app {
        width: 420px;
        height: 600px;
        background: white;
        border-radius: 15px;
        display: flex;
        flex-direction: column;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        overflow: hidden;
    }

    .header {
        background: #4facfe;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 18px;
        font-weight: bold;
    }

    .chat {
        flex: 1;
        padding: 10px;
        overflow-y: auto;
        background: #f5f7fb;
    }

    .msg {
        padding: 10px;
        margin: 8px;
        border-radius: 10px;
        max-width: 80%;
        word-wrap: break-word;
    }

    .user {
        background: #4facfe;
        color: white;
        margin-left: auto;
        text-align: right;
    }

    .bot {
        background: #e5e5e5;
        margin-right: auto;
    }

    .input-area {
        display: flex;
        padding: 10px;
        gap: 5px;
    }

    textarea {
        flex: 1;
        resize: none;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    select, button {
        padding: 8px;
        border-radius: 8px;
        border: none;
    }

    button {
        background: #4facfe;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #00c6ff;
    }
</style>

</head>

<body>

<div class="app">

    <div class="header">🌐 AI NLP Translator Chat</div>

    <div id="chat" class="chat"></div>

    <div class="input-area">
        <textarea id="inputText" rows="2" placeholder="Type message..."></textarea>

        <select id="lang">
            <option value="kn">KN</option>
            <option value="hi">HI</option>
            <option value="ta">TA</option>
        </select>

        <button onclick="translateText()">➤</button>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
