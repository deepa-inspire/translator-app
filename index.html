<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI NLP Translator (AWS Demo)</title>

  <!-- Optional: better UI spacing -->
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
    }

    textarea {
      width: 300px;
      height: 100px;
    }

    button {
      padding: 8px 15px;
      margin-top: 10px;
      cursor: pointer;
    }

    #output {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h2>AI NLP Translator (AWS Demo)</h2>

  <textarea id="inputText" placeholder="Enter text here..."></textarea>

  <br><br>

  <select id="lang">
    <option value="kn">Kannada</option>
    <option value="hi">Hindi</option>
    <option value="ta">Tamil</option>
  </select>

  <br><br>

  <button onclick="translateText()">Translate</button>

  <h3>Output:</h3>
  <p id="output"></p>

  <script src="app.js"></script>

</body>
</html>
